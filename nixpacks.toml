[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.curl", "php82Extensions.gd", "php82Extensions.zip"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader", "npm install && npm run build"]

[start]
cmd = "bash start.sh"
